spring.application.name=the-harry-list-backend

spring.datasource.url=jdbc:mariadb://localhost:3306/harrylist
spring.datasource.username=harryuser
spring.datasource.password=harrypass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=false

# SQL logging - override in dev with: LOGGING_LEVEL_HIBERNATE_SQL=DEBUG
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:WARN}

# Email Configuration (Microsoft Graph for Microsoft 365)
# Set app.mail.enabled=false to disable email notifications in development
app.mail.enabled=false
app.mail.from=noreply@hubble.cafe
app.mail.staff=events@hubble.cafe
app.bar.name=Hubble and Meteor Community Cafes

# Azure AD Configuration (used for both JWT auth and Graph API)
azure.tenant-id=${AZURE_TENANT_ID:}
azure.client-id=${AZURE_CLIENT_ID:}
azure.client-secret=${AZURE_CLIENT_SECRET:}

# Microsoft Graph Configuration (uses Azure AD credentials above)
app.mail.graph.tenant-id=${azure.tenant-id}
app.mail.graph.client-id=${azure.client-id}
app.mail.graph.client-secret=${azure.client-secret}

# Calendar ICS Feed Configuration
calendar.feed.token=${CALENDAR_FEED_TOKEN:}
calendar.feed.staff-token=${CALENDAR_FEED_STAFF_TOKEN:}

# CORS Configuration (comma-separated origins, empty = localhost only)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ALTCHA proof-of-work configuration (privacy-first, self-hosted, no third party)
# Set app.altcha.enabled=true in production with a stable HMAC key.
app.altcha.enabled=${APP_ALTCHA_ENABLED:false}
app.altcha.hmac-key=${APP_ALTCHA_HMAC_KEY:}
app.altcha.max-number=${APP_ALTCHA_MAX_NUMBER:50000}
app.altcha.expiry-seconds=${APP_ALTCHA_EXPIRY_SECONDS:300}

# RBAC - Azure OID of the initial admin user (only used on first-ever login)
app.initial-admin-oid=${INITIAL_ADMIN_OID:}

# Sentry error monitoring (disabled in dev)
sentry.dsn=

# Data Retention - automatically purge reservations older than this many days
# Set to 0 to disable. Configured via DATA_RETENTION_DAYS environment variable.
app.data.retention.days=${DATA_RETENTION_DAYS:365}

