# Gitleaks configuration for the-harry-list
# https://github.com/gitleaks/gitleaks

title = "the-harry-list gitleaks config"

[extend]
# Extend the default ruleset
useDefault = true

[allowlist]
description = "Project-level allowlist"

# Ignore test fixtures and example files
paths = [
  '''tests/''',
  '''test/''',
  '''__tests__/''',
  '''\.test\.(ts|tsx|js|jsx)$''',
  '''\.spec\.(ts|tsx|js|jsx)$''',
  '''.*\.example$''',
  '''.*\.sample$''',
]

# Ignore known safe placeholder values used in config templates
regexes = [
  # Docker Compose template placeholders
  '''__[A-Z_]+__''',
  # Spring Boot property placeholders
  '''\$\{[A-Z_]+:[^}]*\}''',
  # Example/placeholder credentials in application.properties (dev only)
  '''harrypass''',
  '''harryuser''',
]

commits = []

# Allowlist specific findings by fingerprint
# These are example/placeholder credentials in documentation files (curl -u admin:admin)
[[allowlists]]
description = "Example curl credentials in documentation"
fingerprints = [
  "41c90c80527bc0f223c05cb3b3ea7c1fe413ecb9:POSTMAN_TESTING_GUIDE.md:curl-auth-user:461",
  "41c90c80527bc0f223c05cb3b3ea7c1fe413ecb9:POSTMAN_TESTING_GUIDE.md:curl-auth-user:471",
  "41c90c80527bc0f223c05cb3b3ea7c1fe413ecb9:POSTMAN_TESTING_GUIDE.md:curl-auth-user:493",
  "41c90c80527bc0f223c05cb3b3ea7c1fe413ecb9:POSTMAN_TESTING_GUIDE.md:curl-auth-user:499",
