version: 2
updates:
 # ── Backend (Maven) ──────────────────────────────────────────────────────────
 - package-ecosystem: "maven"
   directory: "/the-harry-list-backend"
   schedule:
     interval: "weekly"
     day: "monday"
     time: "09:00"
     timezone: "Europe/Amsterdam"
   open-pull-requests-limit: 5
   reviewers:
     - "PimVanLeeuwen"
   labels:
     - "dependencies"
     - "backend"
   groups:
     # Group all Spring Boot updates into one PR
     spring-boot:
       patterns:
         - "org.springframework*"
         - "spring-*"
     # Group Microsoft/Azure updates into one PR
     microsoft-azure:
       patterns:
         - "com.microsoft*"
         - "com.azure*"

 # ── Admin Frontend (npm) ──────────────────────────────────────────────────────
 - package-ecosystem: "npm"
   directory: "/the-harry-list-admin"
   schedule:
     interval: "weekly"
     day: "monday"
     time: "09:00"
     timezone: "Europe/Amsterdam"
   open-pull-requests-limit: 5
   reviewers:
     - "PimVanLeeuwen"
   labels:
     - "dependencies"
     - "frontend"
     - "admin"
   groups:
     # Group shared dependencies across both frontends
     frontend-shared:
       patterns:
         - "@hookform/resolvers"
         - "@sentry/react"
         - "@tailwindcss/vite"
         - "clsx"
         - "lucide-react"
         - "react"
         - "react-dom"
         - "react-hook-form"
         - "tailwind-merge"
         - "zod"
         - "@eslint/js"
         - "@testing-library/jest-dom"
         - "@testing-library/react"
         - "@testing-library/user-event"
         - "@types/node"
         - "@types/react"
         - "@types/react-dom"
         - "@vitejs/plugin-react"
         - "@vitest/coverage-v8"
         - "autoprefixer"
         - "eslint"
         - "eslint-plugin-react-hooks"
         - "eslint-plugin-react-refresh"
         - "globals"
         - "jsdom"
         - "postcss"
         - "tailwindcss"
         - "typescript"
         - "typescript-eslint"
         - "vite"
         - "vitest"
       update-types:
         - "major"
         - "minor"
         - "patch"
     # Group React/UI related updates (for major updates not in shared)
     react:
       patterns:
         - "react*"
         - "@types/react*"
     # Group Azure MSAL updates
     msal:
       patterns:
         - "@azure/msal-*"
     # Group Radix UI / shadcn
     radix-ui:
       patterns:
         - "@radix-ui/*"

 # ── Public Frontend (npm) ─────────────────────────────────────────────────────
 - package-ecosystem: "npm"
   directory: "/the-harry-list-public"
   schedule:
     interval: "weekly"
     day: "monday"
     time: "09:00"
     timezone: "Europe/Amsterdam"
   open-pull-requests-limit: 5
   reviewers:
     - "PimVanLeeuwen"
   labels:
     - "dependencies"
     - "frontend"
     - "public"
   groups:
     # Group shared dependencies across both frontends
     frontend-shared:
       patterns:
         - "@hookform/resolvers"
         - "@sentry/react"
         - "@tailwindcss/vite"
         - "clsx"
         - "lucide-react"
         - "react"
         - "react-dom"
         - "react-hook-form"
         - "tailwind-merge"
         - "zod"
         - "@eslint/js"
         - "@testing-library/jest-dom"
         - "@testing-library/react"
         - "@testing-library/user-event"
         - "@types/node"
         - "@types/react"
         - "@types/react-dom"
         - "@vitejs/plugin-react"
         - "@vitest/coverage-v8"
         - "autoprefixer"
         - "eslint"
         - "eslint-plugin-react-hooks"
         - "eslint-plugin-react-refresh"
         - "globals"
         - "jsdom"
         - "postcss"
         - "tailwindcss"
         - "typescript"
         - "typescript-eslint"
         - "vite"
         - "vitest"
       update-types:
         - "major"
         - "minor"
         - "patch"
     # Group React/UI related updates
     react:
       patterns:
         - "react*"
         - "@types/react*"

 # ── GitHub Actions ────────────────────────────────────────────────────────────
 - package-ecosystem: "github-actions"
   directory: "/"
   schedule:
     interval: "weekly"
     day: "monday"
     time: "09:00"
     timezone: "Europe/Amsterdam"
   open-pull-requests-limit: 5
   reviewers:
     - "PimVanLeeuwen"
   labels:
     - "dependencies"
     - "ci"
