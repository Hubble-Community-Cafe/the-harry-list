version: 2

# ──────────────────────────────────────────────────────────────────────────────
# Dependabot targets the long-lived `develop` integration branch, NOT `main`.
#
# Why: `main` requires the "Version Bump Check" (see .github/workflows/ci.yml),
# which fails on any PR that doesn't bump the app version. `develop` is kept one
# patch ahead of `main`, so Dependabot PRs inherit that bumped version and pass
# the check automatically — letting them merge (and auto-merge) individually.
# Releases then flow as a single `develop -> main` PR.
#
# Grouping keeps each ecosystem to at most two PRs per run:
#   * one batched PR for minor/patch updates  -> auto-merged into develop
#   * one isolated PR for major updates        -> reviewed manually
# ──────────────────────────────────────────────────────────────────────────────

updates:
  # ── Backend (Maven) ──────────────────────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/the-harry-list-backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "PimVanLeeuwen"
    labels:
      - "dependencies"
      - "backend"
    groups:
      # Everything non-major in a single PR (auto-merged into develop)
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Majors isolated for manual review
      backend-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # ── Admin Frontend (npm) ──────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/the-harry-list-admin"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "PimVanLeeuwen"
    labels:
      - "dependencies"
      - "frontend"
      - "admin"
    groups:
      admin-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      admin-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # ── Public Frontend (npm) ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/the-harry-list-public"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "PimVanLeeuwen"
    labels:
      - "dependencies"
      - "frontend"
      - "public"
    groups:
      public-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      public-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # ── GitHub Actions ────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "PimVanLeeuwen"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
