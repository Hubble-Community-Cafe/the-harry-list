name: E2E

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly at 03:00 UTC
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Boots the e2e stack via the webServer config (docker compose up --build),
      # waits for the backend + both frontends, then runs the suite.
      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload traces, screenshots & videos
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 14

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f ../docker-compose.e2e.yml logs backend --tail=200 || true
