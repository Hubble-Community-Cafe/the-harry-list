name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions for all jobs
permissions:
  contents: read

jobs:
  # ==================== FRONTEND SYNC CHECK ====================
  frontend-sync:
    name: Frontend Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check shared files are in sync
        run: |
          # Files that must stay identical between both frontends
          FILES=(
            "vite.config.ts"
            "tsconfig.json"
            "tsconfig.app.json"
            "tsconfig.node.json"
            "eslint.config.js"
            "nginx.conf"
            "src/lib/ThemeContext.tsx"
            "src/components/ThemeToggle.tsx"
            "src/lib/utils.ts"
            "src/test/setup.ts"
          )

          DRIFTED=0
          for f in "${FILES[@]}"; do
            if ! diff -q "the-harry-list-public/$f" "the-harry-list-admin/$f" > /dev/null 2>&1; then
              echo "::error::DRIFT DETECTED: $f differs between public and admin frontends"
              diff --color "the-harry-list-public/$f" "the-harry-list-admin/$f" || true
              DRIFTED=1
            fi
          done

          if [ $DRIFTED -eq 1 ]; then
            echo ""
            echo "Shared files have drifted. Copy the canonical version to both projects."
            exit 1
          fi

          echo "All shared files are in sync."

      - name: Check shared dependency versions
        run: |
          # Extract shared deps from both package.json and compare versions
          DRIFTED=0
          SHARED_DEPS=(
            "@hookform/resolvers"
            "@sentry/react"
            "@tailwindcss/vite"
            "clsx"
            "lucide-react"
            "react"
            "react-dom"
            "react-hook-form"
            "tailwind-merge"
            "zod"
          )
          SHARED_DEV_DEPS=(
            "@eslint/js"
            "@testing-library/jest-dom"
            "@testing-library/react"
            "@testing-library/user-event"
            "@types/node"
            "@types/react"
            "@types/react-dom"
            "@vitejs/plugin-react"
            "@vitest/coverage-v8"
            "autoprefixer"
            "eslint"
            "eslint-plugin-react-hooks"
            "eslint-plugin-react-refresh"
            "globals"
            "jsdom"
            "postcss"
            "tailwindcss"
            "typescript"
            "typescript-eslint"
            "vite"
            "vitest"
          )

          check_dep() {
            local dep=$1
            local pub_ver admin_ver
            pub_ver=$(node -e "const p=require('./the-harry-list-public/package.json'); console.log((p.dependencies||{})[\"$dep\"] || (p.devDependencies||{})[\"$dep\"] || '')")
            admin_ver=$(node -e "const p=require('./the-harry-list-admin/package.json'); console.log((p.dependencies||{})[\"$dep\"] || (p.devDependencies||{})[\"$dep\"] || '')")
            if [ -n "$pub_ver" ] && [ -n "$admin_ver" ] && [ "$pub_ver" != "$admin_ver" ]; then
              echo "::error::VERSION DRIFT: $dep — public=$pub_ver admin=$admin_ver"
              DRIFTED=1
            fi
          }

          for dep in "${SHARED_DEPS[@]}" "${SHARED_DEV_DEPS[@]}"; do
            check_dep "$dep"
          done

          if [ $DRIFTED -eq 1 ]; then
            echo ""
            echo "Shared dependency versions have drifted. Align them in both package.json files."
            exit 1
          fi

          echo "All shared dependency versions are aligned."

  # ==================== BACKEND ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-harry-list-backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run unit tests
        run: mvn test -B

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: the-harry-list-backend/target/surefire-reports/

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: the-harry-list-backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -B

  # ==================== PUBLIC FRONTEND ====================
  public-frontend-test:
    name: Public Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-harry-list-public
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: the-harry-list-public/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # ==================== ADMIN FRONTEND ====================
  admin-frontend-test:
    name: Admin Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-harry-list-admin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: the-harry-list-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # ==================== DOCKER BUILD & PUSH ====================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, public-frontend-test, admin-frontend-test]
    # Only build and push on main branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ========== BACKEND ==========
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Backend Docker image
        id: push-backend
        uses: docker/build-push-action@v7
        with:
          context: ./the-harry-list-backend
          file: ./the-harry-list-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-backend@${{ steps.push-backend.outputs.digest }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Backend Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-ci

      # ========== PUBLIC FRONTEND ==========
      - name: Extract metadata for Public Frontend
        id: meta-public
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-public
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Public Frontend Docker image
        id: push-public
        uses: docker/build-push-action@v7
        with:
          context: ./the-harry-list-public
          file: ./the-harry-list-public/Dockerfile
          push: true
          tags: ${{ steps.meta-public.outputs.tags }}
          labels: ${{ steps.meta-public.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Public Frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-public@${{ steps.push-public.outputs.digest }}
          format: sarif
          output: trivy-public.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Public Frontend Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-public.sarif
          category: trivy-public-ci

      # ========== ADMIN FRONTEND ==========
      - name: Extract metadata for Admin Frontend
        id: meta-admin
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-admin
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Admin Frontend Docker image
        id: push-admin
        uses: docker/build-push-action@v7
        with:
          context: ./the-harry-list-admin
          file: ./the-harry-list-admin/Dockerfile
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Admin Frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner }}/the-harry-list-admin@${{ steps.push-admin.outputs.digest }}
          format: sarif
          output: trivy-admin.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Admin Frontend Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-admin.sarif
          category: trivy-admin-ci
